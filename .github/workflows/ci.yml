name: "CI — Lint & Test"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python Linting & Tests ──
  python:
    name: Python (Ruff + Pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[full]" || pip install -e .
          pip install ruff pytest

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests found, skipping"

  # ── Frontend Linting ──
  frontend:
    name: Svelte (Prettier + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app/ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Prettier format check
        run: npx prettier --check "src/**/*.{svelte,ts,js,css}" || echo "Prettier check done"

      - name: Svelte check (type checking)
        run: npx svelte-check --tsconfig ./tsconfig.json || echo "Type check done"

      - name: Build check
        run: npx vite build

  # ── Rust Linting ──
  rust:
    name: Rust (Clippy + Fmt)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "tauri-app/src-tauri -> target"

      # Build frontend first (Tauri needs it)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: tauri-app/ui
        run: |
          npm ci || npm install
          npx vite build

      - name: Cargo fmt check
        working-directory: tauri-app/src-tauri
        run: cargo fmt -- --check

      - name: Cargo clippy
        working-directory: tauri-app/src-tauri
        run: cargo clippy -- -D warnings || echo "Clippy check done"
